apiVersion: styra.bankdata.dk/v1beta1
kind: System
metadata:
  labels:
    app.kubernetes.io/name: system
    app.kubernetes.io/instance: system-sample
    app.kubernetes.io/part-of: styra-controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: styra-controller
    styra-controller/control-plane: opa-control-plane
    styra-controller/class: dev
  name: system-sample
spec:
  decisionMappings:
    - allowed:
        expected:
          boolean: true
        path: result.allowed
      name: api/authz/decision
      reason:
        path: result.reasons
  datasources:
    - path: "test"
  sourceControl:
    origin:
      path: policy
      reference: refs/heads/master
      url: 'https://github.com/bd-b0100/pol-library-stress-tester'
  


  