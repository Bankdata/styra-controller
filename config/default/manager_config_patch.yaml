apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - --config=/etc/styra-controller/config.yaml
        - --config=/etc/styra-controller-secrets/config-secrets.yaml
        volumeMounts:
        - name: config
          mountPath: /etc/styra-controller
        - name: config-secrets
          mountPath: /etc/styra-controller-secrets
        - name: token
          mountPath: /etc/styra-controller-token
      volumes:
      - name: config
        configMap:
          name: config
      - name: config-secrets
        secret:
          secretName: config-secrets
      - name: token
        secret:
          secretName: token